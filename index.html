<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梨木樹天主教小學 - 校隊管理系統</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #1e3a8a; --accent: #3b82f6; --bg: #f8fafc; --success: #22c55e; }
        * { box-sizing: border-box; }
        body { 
            font-family: "PingFang HK", "Microsoft JhengHei", sans-serif; 
            margin: 0; display: flex; height: 100vh; background-color: var(--bg);
            background-image: url('https://www.lmsccps.edu.hk/it-school/php/webcms/files/upload/logo/logo.png');
            background-repeat: no-repeat; background-position: center; background-attachment: fixed;
            background-size: 300px; background-color: rgba(248, 250, 252, 0.94); background-blend-mode: overlay;
        }
        .sidebar { width: 260px; background: var(--primary); color: white; display: flex; flex-direction: column; z-index: 10; flex-shrink: 0; }
        .sidebar-header { padding: 20px; text-align: center; background: #172554; }
        .sidebar-menu { flex: 1; overflow-y: auto; padding: 10px; }
        .nav-item { padding: 12px 15px; cursor: pointer; margin-bottom: 5px; border-radius: 8px; display: flex; align-items: center; transition: 0.2s; color: #cbd5e1; text-decoration: none; }
        .nav-item i { width: 25px; }
        .nav-item:hover, .nav-item.active { background: var(--accent); color: white; }
        .nav-group { font-size: 0.75rem; color: #94a3b8; padding: 15px 15px 5px; text-transform: uppercase; }
        .main-content { flex: 1; padding: 25px; overflow-y: auto; }
        .card { background: rgba(255, 255, 255, 0.95); padding: 25px; border-radius: 15px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); backdrop-filter: blur(5px); }
        .search-box { margin-bottom: 20px; display: flex; gap: 10px; }
        .search-input { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 1rem; }
        .search-btn { background: var(--primary); color: white; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; }
        .schedule-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; margin-top: 15px; }
        .date-card { background: white; border: 1px solid #e2e8f0; padding: 15px; border-radius: 10px; text-align: center; cursor: pointer; font-weight: bold; }
        .date-card:hover { border-color: var(--accent); background: #eff6ff; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; border-bottom: 1px solid #edf2f7; text-align: left; }
        th { background: #f1f5f9; color: var(--primary); }
        .btn { padding: 10px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; display: inline-flex; align-items: center; gap: 8px; margin-bottom: 15px; }
