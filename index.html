<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梨木樹天主教小學 - 校隊管理</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; margin: 0; background: #f0f2f5; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #1e3a8a; color: white; padding: 15px; text-align: center; font-weight: bold; }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 220px; background: white; border-right: 1px solid #ccc; overflow-y: auto; }
        .content { flex: 1; padding: 20px; overflow-y: auto; background: white; }
        .menu-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; color: #333; }
        .menu-item:hover { background: #f0f7ff; }
        .active { background: #3b82f6 !important; color: white !important; }
        .date-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 15px; }
        .date-btn { background: #fff; border: 1px solid #3b82f6; padding: 10px; border-radius: 5px; text-align: center; cursor: pointer; color: #1e3a8a; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #f8f9fa; }
        .btn { padding: 8px 15px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .btn-excel { background: #16a34a; color: white; margin-left: 10px; }
        .btn-back { background: #64748b; color: white; }
    </style>
</head>
<body>

<div class="header">梨木樹天主教小學 - 校隊點名系統</div>

<div class="main-container">
    <div class="sidebar">
        <div class="menu-item" style="background:#eee; font-weight:bold; cursor:default;">選擇校隊</div>
        <div id="team-list"></div>
    </div>
    <div class="content" id="main-content">
        <h2>歡迎使用</h2>
        <p>請在左邊選單點擊校隊名稱開始點名。</p>
    </div>
</div>

<script>
    const teamData = [
        { name: "閃避球隊", days: [3, 4], members: ["郭嘉烯", "張雨霏", "何雨馨", "白淽錤", "戴卓琦", "朱晉衡", "張璟釩", "吳穎禧", "王詩琪", "王詩詩", "陳樂兒", "吳浩添"] },
        { name: "田徑隊", days: [3], members: ["學生A", "學生B"] },
        { name: "男子排球隊", days: [3, 5], members: ["學生C", "學生D"] },
        { name: "女子排球隊", days: [1, 4], members: ["學生E", "學生F"] },
        { name: "足球隊", days: [5, 6], members: ["學生G", "學生H"] },
        { name: "籃球隊", days: [1, 5], members: ["學生I", "學生J"] },
        { name: "乒乓球隊", days: [1, 2, 3, 4, 5], members: ["學生K", "學生L"] },
        { name: "長跑隊", days: [1, 5], members: ["學生M", "學生N"] },
        { name: "欖球隊", days: [4], members: ["學生O", "學生P"] }
    ];

    function init() {
        const list = document.getElementById('team-list');
        teamData.forEach((team, idx) => {
            const div = document.createElement('div');
            div.className = 'menu-item';
            div.innerText = team.name;
            div.onclick = () => {
                document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
                div.classList.add('active');
                showDates(idx);
            };
            list.appendChild(div);
        });
    }

    function showDates(idx) {
        const team = teamData[idx];
        let html = `<h3>${team.name} - 選擇練習日期</h3><div class="date-grid">`;
        let curr = new Date();
        const end = new Date(2026, 5, 30);
        while(curr <= end) {
            if(team.days.includes(curr.getDay())) {
                const d = curr.toISOString().split('T')[0];
                html += `<div class="date-btn" onclick="showRollCall(${idx}, '${d}')">${d.substring(5)}</div>`;
            }
            curr.setDate(curr.getDate() + 1);
        }
        document.getElementById('main-content').innerHTML = html + `</div>`;
    }

    function showRollCall(idx, date) {
        const team = teamData[idx];
        let html = `<h3>${team.name} (${date})</h3>`;
        html += `<button class="btn btn-back" onclick="showDates(${idx})">返回日期</button>`;
        html += `<button class="btn btn-excel" onclick="exportCSV('${team.name}','${date}')">匯出 Excel</button>`;
        html += `<table id="roll-table"><thead><tr><th>姓名</th><th>出席狀態</th></tr></thead><tbody>`;
        team.members.forEach(m => {
            html += `<tr><td>${m}</td><td><select><option>出席</option><option>遲到</option><option>缺席</option></select></td></tr>`;
        });
        document.getElementById('main-content').innerHTML = html + `</tbody></table>`;
    }

    function exportCSV(name, date) {
        let csv = "\uFEFF姓名,狀態\n";
        document.querySelectorAll('#roll-table tbody tr').forEach(row => {
            csv += `${row.cells[0].innerText},${row.querySelector('select').value}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${name}_${date}.csv`;
        a.click();
    }

    init();
</script>
</body>
</html>
