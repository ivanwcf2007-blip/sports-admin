<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>全校校隊管理系統 v3.0 - 支援 Excel 匯出</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; --success: #27ae60; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 260px; background: var(--primary); color: white; display: flex; flex-direction: column; z-index: 100; }
        .sidebar-header { padding: 20px; text-align: center; border-bottom: 1px solid #3e4f5f; }
        .sidebar-menu { flex: 1; overflow-y: auto; padding: 10px; }
        .nav-item { padding: 12px 15px; cursor: pointer; margin-bottom: 5px; border-radius: 8px; display: flex; align-items: center; transition: 0.2s; color: #ecf0f1; text-decoration: none; }
        .nav-item i { margin-right: 10px; width: 20px; }
        .nav-item:hover, .nav-item.active { background: var(--accent); color: white; }
        .nav-group { font-size: 0.8rem; color: #888; padding: 15px 15px 5px 15px; text-transform: uppercase; letter-spacing: 1px; }

        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); min-height: 400px; }
        h2 { margin-top: 0; color: var(--primary); border-left: 5px solid var(--accent); padding-left: 15px; }

        .schedule-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-top: 20px; }
        .date-card { background: white; border: 1px solid #ddd; padding: 12px; border-radius: 8px; text-align: center; cursor: pointer; transition: 0.2s; }
        .date-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .date-card.past { background: #f1f2f6; color: #7f8c8d; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { padding: 12px; border: 1px solid #eee; text-align: left; }
        th { background: #f8f9fa; color: var(--primary); }
        
        .action-bar { margin-top: 20px; display: flex; gap: 10px; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .btn-save { background: var(--success); color: white; }
        .btn-export { background: #e67e22; color: white; }
        .btn-back { background: #95a5a6; color: white; }
        
        select, input[type="text"] { padding: 6px; border-radius: 4px; border: 1px solid #ccc; width: 100%; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header"><h3>校隊管理系統</h3></div>
    <div class="sidebar-menu">
        <div class="nav-group">日常功能</div>
        <div class="nav-item active" id="btn-home" onclick="showDashboard()"><i class="fas fa-home"></i> 系統總覽</div>
        <div class="nav-group">校隊列表 (點名)</div>
        <div id="team-list-container"></div>
    </div>
</div>

<div class="main-content">
    <div class="card" id="app-card">
        <h2 id="view-title">歡迎使用體育組管理系統</h2>
        <div id="content-area">請從左側選單選擇校隊。</div>
    </div>
</div>

<script>
    // 校隊資料設定 (0=日, 1=一, 2=二, 3=三, 4=四, 5=五, 6=六)
    const teams = [
        { id: 1, name: "田徑隊", days: [3], icon: "fa-running", members: ["學生A", "學生B", "學生C"] },
        { id: 2, name: "男子排球隊", days: [3, 5], icon: "fa-volleyball-ball", members: ["學生D", "學生E"] },
        { id: 3, name: "女子排球隊", days: [1, 4], icon: "fa-volleyball-ball", members: ["學生F", "學生G"] },
        { id: 4, name: "足球隊", days: [5, 6], icon: "fa-football-ball", members: ["學生H", "學生I"] },
        { id: 5, name: "籃球隊", days: [1, 5], icon: "fa-basketball-ball", members: ["學生J", "學生K"] },
        { id: 6, name: "閃避球隊", days: [3, 4], icon: "fa-bowling-ball", members: ["郭嘉烯", "張雨霏", "何雨馨", "白淽錤", "戴卓琦", "朱晉衡", "張璟釩", "吳穎禧", "王詩琪", "王詩詩", "陳樂兒", "吳浩添"] },
        { id: 7, name: "乒乓球隊", days: [1, 2, 3, 4, 5], icon: "fa-table-tennis", members: ["學生L", "學生M"] },
        { id: 8, name: "長跑隊", days: [1, 5], icon: "fa-stopwatch", members: ["學生N", "學生O"] },
        { id: 9, name: "欖球隊", days: [4], icon: "fa-football-ball", members: ["學生P", "學生Q"] }
    ];

    // 初始化側邊欄
    function initSidebar() {
        const container = document.getElementById('team-list-container');
        container.innerHTML = '';
        teams.forEach(team => {
            const item = document.createElement('div');
            item.className = 'nav-item';
            item.innerHTML = `<i class="fas ${team.icon}"></i> ${team.name}`;
            item.onclick = () => {
                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                item.classList.add('active');
                showSchedule(team);
            };
            container.appendChild(item);
        });
    }

    // 系統總覽
    function showDashboard() {
        document.getElementById('view-title').innerText = "系統總覽";
        document.getElementById('content-area').innerHTML = `
            <p>本系統已自動生成 <b>2026年4月21日</b> 至 <b>2026年6月30日</b> 之訓練日程。</p>
            <p>點選左側校隊名單後，再選擇特定日期即可進行點名。</p>
        `;
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById('btn-home').classList.add('active');
    }

    // 顯示校隊日程
    function showSchedule(team) {
        document.getElementById('view-title').innerText = team.name + " - 練習日程";
        let curr = new Date();
        const end = new Date(2026, 5, 30);
        let html = '<div class="schedule-list">';
        
        while (curr <= end) {
            if (team.days.includes(curr.getDay())) {
                const dateStr = curr.toISOString().split('T')[0];
                const dayName = ['日','一','二','三','四','五','六'][curr.getDay()];
                const isPast = curr < new Date().setHours(0,0,0,0) ? 'past' : '';
                html += `
                    <div class="date-card ${isPast}" onclick='showAttendanceSheet(${JSON.stringify(team)}, "${dateStr}")'>
                        <b>${dateStr}</b><br><small>(星期${dayName})</small>
                    </div>`;
            }
            curr.setDate(curr.getDate() + 1);
        }
        html += '</div>';
        document.getElementById('content-area').innerHTML = html;
    }

    // 顯示點名表
    function showAttendanceSheet(team, date) {
        document.getElementById('view-title').innerText = `${team.name} - 點名 (${date})`;
        let html = `
            <div class="action-bar">
                <button class="btn btn-back" onclick='showSchedule(${JSON.stringify(team)})'><i class="fas fa-arrow-left"></i> 返回</button>
                <button class="btn btn-export" onclick="exportToExcel('${team.name}', '${date}')"><i class="fas fa-file-excel"></i> 匯出 Excel (CSV)</button>
            </div>
            <table id="attendance-table">
                <thead><tr><th>學生姓名</th><th>出席狀態</th><th>備註</th></tr></thead>
                <tbody>
                    ${team.members.map(m => `
                        <tr>
                            <td>${m}</td>
                            <td>
                                <select class="status-select">
                                    <option value="出席">出席</option>
                                    <option value="遲到">遲到</option>
                                    <option value="缺席">缺席</option>
                                </select>
                            </td>
                            <td><input type="text" class="remark-input" placeholder="-"></td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
            <div class="action-bar"><button class="btn btn-save" onclick="alert('點名資料已暫存於瀏覽器')">儲存點名</button></div>
        `;
        document.getElementById('content-area').innerHTML = html;
    }

    // 匯出 Excel (CSV 格式)
    function exportToExcel(teamName, date) {
        let csvContent = "\uFEFF"; // 加上 BOM 避免 Excel 開啟中文亂碼
        csvContent += `校隊,${teamName}\n日期,${date}\n\n`;
        csvContent += "學生姓名,出席狀態,備註\n";

        const rows = document.querySelectorAll("#attendance-table tbody tr");
        rows.forEach(row => {
            const name = row.cells[0].innerText;
            const status = row.querySelector(".status-select").value;
            const remark = row.querySelector(".remark-input").value;
            csvContent += `${name},${status},${remark}\n`;
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", `${teamName}_點名紀錄_${date}.csv`);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // 啟動
    window.onload = () => {
        initSidebar();
        showDashboard();
    };
</script>

</body>
</html>
