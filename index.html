<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>梨木樹天主教小學 - 校隊管理系統</title>
    <style>
        :root { --blue: #1e3a8a; --light-blue: #3b82f6; --orange: #f97316; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background-color: #f8fafc; height: 100vh; display: flex; flex-direction: column; }
        
        /* 頁首與導航 */
        .header { background: var(--blue); color: white; padding: 12px; text-align: center; font-weight: bold; position: relative; z-index: 1001; display: flex; justify-content: space-between; align-items: center; }
        .menu-toggle { display: block; background: none; border: none; color: white; font-size: 24px; cursor: pointer; padding: 0 10px; }
        
        .wrapper { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        /* 側邊欄：手機版預設隱藏，電腦版顯示 */
        .sidebar { 
            width: 240px; background: white; border-right: 1px solid #ddd; overflow-y: auto; 
            transition: transform 0.3s ease; position: absolute; height: 100%; z-index: 1000;
        }
        .sidebar.closed { transform: translateX(-100%); }
        
        .main { flex: 1; padding: 15px; overflow-y: auto; width: 100%; box-sizing: border-box; }

        /* 電腦版適配 */
        @media (min-width: 768px) {
            .menu-toggle { display: none; }
            .sidebar { position: relative; transform: none !important; }
            .main { padding: 25px; }
        }

        /* 導航項目 */
        .nav-item { padding: 15px 20px; border-bottom: 1px solid #eee; cursor: pointer; color: #333; }
        .active { background: #eff6ff !important; color: var(--blue) !important; font-weight: bold; border-left: 5px solid var(--blue); }
        
        /* 卡片與表格 */
        .card { background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); padding: 15px; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; background: white; font-size: 14px; }
        th { background: #f1f5f9; padding: 10px 5px; text-align: left; }
        td { border-bottom: 1px solid #eee; padding: 10px 5px; }
        
        /* 按鈕優化 */
        .btn { padding: 10px 16px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; font-size: 14px; display: inline-block; }
        .btn-primary { background: var(--blue); color: white; }
        .btn-excel { background: var(--orange); color: white; margin-bottom: 10px; }
        
        select { padding: 8px; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; background: white; width: 100%; }

        /* 管理中心摺疊 */
        .config-card { border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 10px; background: white; }
        .card-header { padding: 15px; cursor: pointer; display: flex; justify-content: space-between; font-weight: bold; }
        .card-content { padding: 15px; display: none; border-top: 1px solid #eee; background: #fafafa; }
        .open .card-content { display: block; }
        textarea { width: 100%; height: 200px; padding: 10px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 5px; }

        #loader { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); z-index:9999; justify-content:center; align-items:center; flex-direction:column; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 999; }
        .overlay.show { display: block; }
    </style>
</head>
<body>

<div id="loader">⚙️ 處理中...</div>
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="header">
    <button class="menu-toggle" onclick="toggleMenu()">☰</button>
    <div>LMSCCPS 校隊管理</div>
    <div style="width:40px;"></div> </div>

<div class="wrapper">
    <div class="sidebar closed" id="sidebar">
        <div class="nav-item active" id="nav-cfg" onclick="showManager(); toggleMenu();">⚙️ 校隊與名單管理</div>
        <div style="padding:15px 20px; font-size:12px; background:#f8fafc; color:#94a3b8; font-weight:bold;">點名區域</div>
        <div id="team-menu"></div>
    </div>
    
    <div class="main" id="display-area"></div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzj_nokXo1TygqWbOv3Agg8UNcY9pJASjUUoe4dBGekMSXNnD10zdiyjMJDuVx0b9KE/exec"; // 請確保這是最新部署網址
    let teams = []; let cloudAtt = [];

    async function init() {
        showLoader(true);
        try {
            const resp = await fetch(API_URL);
            const data = await resp.json();
            teams = data.teams || [];
            cloudAtt = data.attendance || [];
            renderSidebar();
            showManager();
        } catch(e) { alert("同步失敗，請檢查 API 網址"); }
        showLoader(false);
    }

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('closed');
        document.getElementById('overlay').classList.toggle('show');
    }

    function renderSidebar() {
        const menu = document.getElementById('team-menu');
        menu.innerHTML = '';
        teams.forEach((t, i) => {
            const div = document.createElement('div');
            div.className = 'nav-item';
            div.innerText = "🏐 " + t.name;
            div.onclick = () => { renderDates(i); toggleMenu(); };
            menu.appendChild(div);
        });
    }

    function showManager() {
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById('nav-cfg').classList.add('active');
        let html = `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h3 style="margin:0;">設定中心</h3>
            <button class="btn btn-primary" onclick="saveConfig()">💾 儲存</button>
        </div>
        <button class="btn" style="background:#eee; width:100%; margin-bottom:15px;" onclick="addTeam()">+ 新增校隊</button>`;
        
        teams.forEach((t, i) => {
            html += `<div class="config-card" id="card-${i}">
                <div class="card-header" onclick="this.parentElement.classList.toggle('open')">
                    ${t.name} <span style="color:#999; font-size:12px;">${t.members.length}人 ▾</span>
                </div>
                <div class="card-content">
                    隊名: <input type="text" value="${t.name}" onchange="teams[${i}].name=this.value" style="width:100%; padding:8px; margin:5px 0;"><br>
                    練習日 (0=日, 1=一): <input type="text" value="${t.days.join(',')}" onchange="teams[${i}].days=this.value.split(',').map(Number)" style="width:100%; padding:8px; margin:5px 0;"><br>
                    名單:<br><textarea onchange="updateMembers(${i}, this.value)">${t.members.map(m => `${m.class} ${m.no} ${m.name}`).join('\n')}</textarea>
                    <button class="btn" style="color:red; background:none; width:100%;" onclick="if(confirm('刪除？')){teams.splice(${i},1);showManager();}">🗑️ 刪除此隊</button>
                </div>
            </div>`;
        });
        document.getElementById('display-area').innerHTML = html;
    }

    function updateMembers(idx, val) {
        teams[idx].members = val.split('\n').filter(l => l.trim()).map(line => {
            const p = line.replace(/[()\-?]/g, ' ').replace(/\s+/g, ' ').trim().split(' ');
            return { class: p[0] || '?', no: p[1] || '?', name: p[2] || '?' };
        });
    }

    function addTeam() { teams.unshift({name: "新校隊", days: [1], members: []}); showManager(); }

    async function saveConfig() {
        showLoader(true
