        .logo-img { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); height: 40px; background: white; border-radius: 50%; padding: 2px; }
        .wrapper { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 240px; background: rgba(255,255,255,0.9); border-right: 1px solid #ddd; overflow-y: auto; }
        .main-content { flex: 1; padding: 20px; overflow-y: auto; background: rgba(255,255,255,0.7); }
        .nav-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .nav-item:hover { background: #eff6ff; }
        .active { background: var(--light-blue) !important; color: white !important; }
        .date-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 15px; }
        .date-btn { border: 1px solid var(--light-blue); background: white; padding: 12px; border-radius: 8px; text-align: center; cursor: pointer; font-weight: bold; color: var(--blue); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; font-size: 14px; }
        th { background: #f1f5f9; }
        .btn { padding: 10px 15px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }
        .btn-save { background: #16a34a; color: white; }
        .btn-excel { background: #ea580c; color: white; margin-left: 10px; }
        .search-area { background: white; padding: 15px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 20px; }
        #loader { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); z-index:999; justify-content:center; align-items:center; font-weight:bold; color:var(--blue); }
    </style>
</head>
