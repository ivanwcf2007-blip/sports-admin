<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LMSCCPS 校隊管理系統</title>
    <style>
        :root { --blue: #1e3a8a; --light-blue: #3b82f6; --orange: #f97316; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: #f8fafc; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Header 固定在頂部 */
        .header { 
            background: var(--blue); color: white; height: 60px; 
            display: flex; align-items: center; padding: 0 15px; 
            position: relative; z-index: 2000; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .menu-btn { 
            background: none; border: none; color: white; font-size: 28px; 
            cursor: pointer; padding: 10px; margin-right: 10px; line-height: 1;
        }
        
        .wrapper { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        /* 側邊欄：增加強制層級 */
        #sidebar { 
            width: 260px; background: white; border-right: 1px solid #ddd; 
            overflow-y: auto; position: absolute; top: 0; left: 0; bottom: 0;
            transition: transform 0.3s ease-in-out; z-index: 1500;
        }
        /* 手機模式預設隱藏 (移到左邊外面) */
        .mobile-hidden { transform: translateX(-100%); }
        
        /* 電腦模式強制顯示 */
        @media (min-width: 992px) {
            .mobile-hidden { transform: translateX(0) !important; }
            .menu-btn { display: none; }
            #sidebar { position: relative; }
            .overlay { display: none !important; }
        }
        
        /* 遮罩層：點擊選單外圍可收起 */
        .overlay { 
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
            background: rgba(0,0,0,0.5); z-index: 1400; 
        }
        .overlay.show { display: block; }
        
        .main { flex: 1; padding: 15px; overflow-y: auto; -webkit-overflow-scrolling: touch; }

        .nav-item { padding: 15px 20px; border-bottom: 1px solid #f1f5f9; cursor: pointer; color: #333; font-size: 16px; }
        .nav-item.active { background: #eff6ff !important; color: var(--blue) !important; font-weight: bold; border-left: 4px solid var(--blue); }
        
        .card { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); padding: 15px; margin-bottom: 15px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; font-size: 15px; }
        th { background: #f8fafc; padding: 12px 5px; text-align: left; color: #64748b; border-bottom: 2px solid #edf2f7; }
        td { padding: 12px 5px; border-bottom: 1px solid #f1f5f9; }
        
        .btn { padding: 12px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; font-size: 14px; }
        .btn-primary { background: var(--blue); color: white; }
        .btn-excel { background: var(--orange); color: white; width: 100%; margin-bottom: 15px; }
        
        select { padding: 10px; border-radius: 8px; border: 1px solid #cbd5e0; font-size: 16px; width: 100%; background: white; }

        .config-card { border: 1px solid #e2e8f0; border-radius: 10px; margin-bottom: 12px; background: white; overflow: hidden; }
        .card-header { padding: 18px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .card-content { padding: 15px; display: none; border-top: 1px solid #edf2f7; background: #fafafa; }
        .open .card-content { display: block; }
        textarea { width: 100%; height: 250px; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-family: monospace; box-sizing: border-box; }

        #loader { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.95); z-index:3000; justify-content:center; align-items:center; flex-direction:column; text-align:center; }
    </style>
</head>
<body>

<div id="loader">
    <div style="font-size: 40px; margin-bottom: 15px;">🔄</div>
    <div id="loader-text">讀取中...</div>
</div>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<header class="header">
    <button class="menu-btn" onclick="toggleMenu()" aria-label="選單">☰</button>
    <div style="font-size: 18px;">LMSCCPS 校隊點名</div>
</header>

<div class="wrapper">
    <aside id="sidebar" class="mobile-hidden">
        <div class="nav-item active" id="nav-cfg" onclick="handleMenuClick('CONFIG')">⚙️ 設定中心</div>
        <div style="padding:15px 20px; font-size:12px; font-weight:bold; color:#94a3b8; background:#f8fafc;">校隊列表</div>
        <div id="team-menu"></div>
    </aside>
    
    <main class="main" id="display-area">
        <div style="text-align: center; color: #64748b; margin-top: 50px;">請點選左上角選單開始</div>
    </main>
</div>

<script>
    // ⚠️ 請在此處填入您的 Google Script URL
    const API_URL = "https://script.google.com/macros/s/AKfycbzj_nokXo1TygqWbOv3Agg8UNcY9pJASjUUoe4dBGekMSXNnD10zdiyjMJDuVx0b9KE/exec"; 

    let teams = []; 
    let cloudAtt = [];

    // 初始化讀取
    async function init() {
        toggleLoader(true, "連線中...");
        try {
            const resp = await fetch(API_URL);
            const data = await resp.json();
            teams = data.teams || [];
            cloudAtt = data.attendance || [];
            renderSidebar();
            showManager();
        } catch(e) {
            document.getElementById('loader-text').innerHTML = "<span style='color:red;'>連線失敗</span><br>請檢查網路及API設定";
        } finally {
            toggleLoader(false);
        }
    }

    // 選單切換邏輯 (重點修正)
    function toggleMenu() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        sidebar.classList.toggle('mobile-hidden');
        overlay.classList.toggle('show');
    }

    function handleMenuClick(type, index = null) {
        // 在手機版點擊後自動收起選單
        if (window.innerWidth < 992) {
            toggleMenu();
        }
        
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        
        if (type === 'CONFIG') {
            document.getElementById('nav-cfg').classList.add('active');
            showManager();
        } else {
            // 校隊點名頁面
            renderDates(index);
        }
    }

    function renderSidebar() {
        const menu = document.getElementById('team-menu');
        menu.innerHTML = '';
        teams.forEach((t, i) => {
            const div = document.createElement('div');
            div.className = 'nav-item';
            div.innerHTML = "🏐 " + t.name;
            div.onclick = () => {
                div.classList.add('active');
                handleMenuClick('TEAM', i);
            };
            menu.appendChild(div);
        });
    }

    // --- 以下為原有功能邏輯，保持不變 ---

    function showManager() {
        let html = `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h3 style="margin:0;">設定中心</h3>
            <button class="btn btn-primary" onclick="saveConfig()">💾 儲存</button>
        </div>
        <button class="btn" style="background:#edf2f7; width:100%; margin-bottom:15px;" onclick="addTeam()">+ 新增校隊</button>`;
        
        teams.forEach((t, i) => {
            html += `<div class="config-card" id="card-${i}">
                <div class="card-header" onclick="this.parentElement.classList.toggle('open')">
                    ${t.name} <span style="color:#999; font-size:12px;">${t.members.length}人 ▾</span>
                </div>
                <div class="card-content">
                    隊名: <input type="text" value="${t.name}" onchange="teams[${i}].name=this.value" style="width:100%; padding:10px; margin:5px 0 15px 0; border:1px solid #ddd; border-radius:6px; box-sizing:border-box;">
                    名單:<br><textarea onchange="updateMembers(${i}, this.value)">${t.members.map(m => `${m.class} ${m.no} ${m.name}`).join('\n')}</textarea>
                    <button class="btn" style="color:red; background:none; width:100%; margin-top:10px;" onclick="if(confirm('刪除？')){teams.splice(${i},1);showManager();}">🗑️ 刪除校隊</button>
                </div>
            </div>`;
        });
        document.getElementById('display-area').innerHTML = html;
    }

    function updateMembers(idx, val) {
        teams[idx].members = val.split('\n').filter(l => l.trim()).map(line => {
            const p = line.replace(/[()\-?]/g, ' ').replace(/\s+/g, ' ').trim().split(' ');
            return { class: p[0] || '?', no: p[1] || '?', name: p[2] || '?' };
        });
    }

    function addTeam() { teams.unshift({name: "新校隊", days: [1], members: []}); showManager(); }

    async function saveConfig() {
        toggleLoader(true, "儲存中...");
        await fetch(API_URL, { method: 'POST', body: JSON.stringify({ type: "CONFIG", teams: teams }) });
        alert("儲存成功！");
        init();
    }

    function renderDates(idx) {
        const t = teams[idx];
        let html = `<button class="btn btn-excel" onclick="exportFull(${idx})">📊 匯出總表</button>
        <h3 style="margin:10px 0;">${t.name}</h3>
        <div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap:12px;">`;
        let curr = new Date('2026-04-01');
        while(curr <= new Date('2026-06-30')) {
            if(t.days.includes(curr.getDay())) {
                const d = curr.toISOString().split('T')[0];
                html += `<div class="card" style="padding:15px 5px; text-align:center; cursor:pointer; margin:0; font-weight:bold; color:var(--blue);" onclick="renderRoll(${idx},'${d}')">${d.substring(5)}</div>`;
            }
            curr.setDate(curr.getDate()+1);
        }
        document.getElementById('display-area').innerHTML = html + "</div>";
    }

    function renderRoll(idx, date) {
        const t = teams[idx];
        const record = cloudAtt.find(r => r.teamName === t.name && r.date === date);
        const att = record ? record.attendance : {};
        let html = `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h4 style="margin:0;">${date}</h4>
            <div><button class="btn btn-primary" onclick="saveAtt(${idx},'${date}')">儲存</button></div>
        </div>
        <table><tr><th width="30%">班/號</th><th width="40%">姓名</th><th width="30%">狀態</th></tr>`;
        t.members.forEach(m => {
            const s = att[m.name] || "出席";
            html += `<tr><td>${m.class}-${m.no}</td><td><strong>${m.name}</strong></td>
                <td><select id="s-${m.name}"><option ${s=='出席'?'selected':''}>出席</option><option ${s=='請假'?'selected':''}>請假</option><option ${s=='遲到'?'selected':''}>遲到</option><option ${s=='缺席'?'selected':''}>缺席</option></select></td></tr>`;
        });
        document.getElementById('display-area').innerHTML = html + "</table>";
    }

    async function saveAtt(idx, date) {
        const t = teams[idx]; const att = {};
        t.members.forEach(m => att[m.name] = document.getElementById('s-'+m.name).value);
        toggleLoader(true, "儲存中...");
        await fetch(API_URL, { method: 'POST', body: JSON.stringify({ teamName: t.name, date: date, attendance: att }) });
        alert("點名完成！");
        init();
    }

    function exportFull(idx) {
        const t = teams[idx]; let csv = "\uFEFF班別,學號,姓名"; let dates = [];
        let curr = new Date('2026-04-01');
        while(curr <= new Date('2026-06-30')) {
            if(t.days.includes(curr.getDay())) { const d = curr.toISOString().split('T')[0]; dates.push(d); csv += "," + d; }
            curr.setDate(curr.getDate() + 1);
        }
        csv += "\n";
        t.members.forEach(m => {
            csv += `${m.class},${m.no},${m.name}`;
            dates.forEach(d => {
                const r = cloudAtt.find(rec => rec.teamName === t.name && rec.date === d);
                csv += "," + (r ? r.attendance[m.name] : "-");
            });
            csv += "\n";
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${t.name}_出席表.csv`; a.click();
    }

    function toggleLoader(show, text = "") {
        document.getElementById('loader').style.display = show ? 'flex' : 'none';
        if (text) document.getElementById('loader-text').innerText = text;
    }

    window.onload = init;
</script>
</body>
</html>
