        body { 
            font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh;

        .header { background: var(--blue); color: white; padding: 15px; text-align: center; font-weight: bold; }

        .active { background: var(--light-blue) !important; color: white !important; }
        .date-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 15px; }
        .date-btn { border: 1px solid var(--light-blue); background: white; padding: 12px; border-radius: 8px; text-align: center; cursor: pointer; font-weight: bold; color: var(--blue); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #f1f5f9; }
        .btn { padding: 10px 15px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .btn-save { background: #16a34a; color: white; }
        .btn-excel { background: #ea580c; color: white; margin-left: 10px; }
        #loader { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); z-index:999; justify-content:center; align-items:center; }
    </style>
</head>
