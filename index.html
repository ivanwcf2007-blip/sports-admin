        .btn-mgr { background: #10b981; color: white; }

    </div>

        const cleanLine = line.trim().replace(/,/g, ' ').replace(/\s+/g, ' ');

        return { class: parts[0] || '?', no: parts[1] || '?', name: parts[2] || '?' };
    }

    async function init() {
        showLoader(true);
        try {

            cloudAtt = data.attendance || [];
            renderSidebar();
            showManager();
        } catch(e) { console.error(e); }
        showLoader(false);
    }
